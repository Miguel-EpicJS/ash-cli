name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Run ruff check
        run: uv run ruff check src/

      - name: Run ruff format
        run: uv run ruff format --check src/

      - name: Run mypy
        run: uv run mypy src/